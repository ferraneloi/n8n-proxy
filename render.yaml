services:
  - type: web
    name: n8n-proxy
    env: node
    plan: starter
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Token para autenticar el registro del túnel.
      # Debe coincidir con CONFIG_TOKEN en tu .env local.
      - key: CONFIG_TOKEN
        value: mysecret